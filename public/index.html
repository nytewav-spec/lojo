<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fff;
            display: flex;
            justify-content: center;
            font-family: 'Roboto', Arial, Helvetica, sans-serif;
        }
        .page {
            display: none;
            width: 100%;
        }
        .page.active {
            display: flex;
            justify-content: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 900px;
            min-height: 100vh;
            padding: 20px;
            background: #fff;
            margin: 0 auto;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .dashboard-header h1 {
            color: #1877f2;
            font-size: 24px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .add-video-form {
            background: #f7f8fa;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e4e6eb;
            margin-bottom: 30px;
        }
        .add-video-form h3 {
            color: #1a1a1a;
            font-size: 18px;
            margin-bottom: 16px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .add-video-form input,
        .add-video-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            font-family: Arial, Helvetica, sans-serif;
            transition: border-color 0.3s;
        }
        .add-video-form textarea {
            resize: vertical;
            min-height: 60px;
        }
        .add-video-form input:focus,
        .add-video-form textarea:focus {
            border-color: #1877f2;
        }
        .add-video-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .add-video-form input[type="file"] {
            padding: 10px 12px;
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            background: #fafbfc;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
        }
        .add-video-form input[type="file"]:hover {
            border-color: #1877f2;
            background: #f0f7ff;
        }
        .add-video-form button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: #1877f2;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }
        .add-video-form button:hover {
            opacity: 0.9;
        }
        .add-video-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .video-list {
            display: grid;
            gap: 12px;
        }
        .video-item {
            background: #f7f8fa;
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid #e4e6eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.3s;
            flex-wrap: wrap;
            gap: 12px;
        }
        .video-item:hover {
            border-color: #1877f2;
        }
        .video-item .video-info {
            flex: 1;
        }
        .video-item .video-info .title {
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 600;
            font-family: Arial, Helvetica, sans-serif;
        }
        .video-item .video-info .desc {
            color: #666;
            font-size: 13px;
            margin-top: 2px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .video-item .video-info .video-thumb {
            margin-top: 6px;
        }
        .video-item .video-info .video-thumb img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 8px;
            border: 1px solid #e4e6eb;
            object-fit: cover;
        }
        .video-item .video-info .video-id {
            color: #999;
            font-size: 11px;
            margin-top: 4px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .video-item .video-info .video-id a {
            color: #1877f2;
            text-decoration: none;
        }
        .video-item .video-info .video-id a:hover {
            text-decoration: underline;
        }
        .video-item .video-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .video-item .video-actions button {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.3s;
            font-family: Arial, Helvetica, sans-serif;
        }
        .video-item .video-actions .edit-btn {
            background: #e4e6eb;
            color: #1a1a1a;
        }
        .video-item .video-actions .edit-btn:hover {
            background: #d0d2d6;
        }
        .video-item .video-actions .delete-btn {
            background: #dc3545;
            color: #fff;
        }
        .video-item .video-actions .delete-btn:hover {
            opacity: 0.8;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a1a;
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            display: none;
            z-index: 999;
            max-width: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            font-family: Arial, Helvetica, sans-serif;
        }
        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        .toast.success {
            border-left: 4px solid #28a745;
        }
        .toast.error {
            border-left: 4px solid #dc3545;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .edit-modal.active {
            display: flex;
        }
        .edit-modal .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .edit-modal .modal-content h3 {
            color: #1a1a1a;
            margin-bottom: 16px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .edit-modal .modal-content input,
        .edit-modal .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            font-family: Arial, Helvetica, sans-serif;
        }
        .edit-modal .modal-content textarea {
            resize: vertical;
            min-height: 60px;
        }
        .edit-modal .modal-content input:focus,
        .edit-modal .modal-content textarea:focus {
            border-color: #1877f2;
        }
        .edit-modal .modal-content .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }
        .edit-modal .modal-content .modal-actions button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            flex: 1;
            font-family: Arial, Helvetica, sans-serif;
        }
        .edit-modal .modal-content .modal-actions .save-btn {
            background: #1877f2;
            color: #fff;
        }
        .edit-modal .modal-content .modal-actions .cancel-btn {
            background: #e4e6eb;
            color: #1a1a1a;
        }
        .edit-modal .modal-content .modal-actions button:hover {
            opacity: 0.8;
        }
        @media (max-width: 600px) {
            .add-video-form .form-row {
                grid-template-columns: 1fr;
            }
            .video-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .video-item .video-actions {
                width: 100%;
            }
            .video-item .video-actions button {
                flex: 1;
                text-align: center;
            }
            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div id="dashboardPage" class="page active">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <div>
                    <h1>📹 Video Manager</h1>
                </div>
            </div>
            <div class="add-video-form">
                <h3>➕ Add New Video</h3>
                <div class="form-row">
                    <input type="text" id="videoTitleInput" placeholder="Video Title" />
                    <input type="file" id="videoImageInput" accept="image/*" />
                </div>
                <textarea id="videoDescInput" placeholder="Video Description (shows on WhatsApp preview)"></textarea>
                <input type="text" id="videoSiteNameInput" placeholder="Show Name As (e.g. Instagram.com, Facebook.com)" />
                <button id="addVideoBtn" onclick="addVideo()">Add Video</button>
            </div>
            <div id="videoListContainer">
                <div class="empty-state"><p>Loading videos…</p></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="edit-modal" id="editModal">
        <div class="modal-content">
            <h3>✏️ Edit Video</h3>
            <input type="text" id="editTitle" placeholder="Video Title" />
            <input type="text" id="editImage" placeholder="Image URL" />
            <textarea id="editDesc" placeholder="Video Description"></textarea>
            <input type="text" id="editSiteName" placeholder="Show Name As (e.g. Instagram.com)" />
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button class="save-btn" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>
    <script>
        // ============================================================
        // DATA LAYER
        // ============================================================
        // IMPORTANT: videos are now sourced from the server's /api/videos
        // endpoint (backed by videos.json), NOT localStorage. localStorage
        // is per-browser and invisible to WhatsApp/Facebook's crawlers, so
        // any video that only existed in localStorage would 404 on the
        // server when a real shared link was scraped — producing an empty
        // preview with no title/description/image. The server is now the
        // single source of truth; this page just reads/writes through it.
        // ============================================================

        let videos = [];
        let editId = null;

        async function loadVideos() {
            try {
                const res = await fetch('/api/videos');
                if (!res.ok) throw new Error('Failed to load videos');
                videos = await res.json();
            } catch (e) {
                console.error('❌ Failed to load videos from server:', e);
                videos = [];
                showToast('Could not load videos from server', 'error');
            }
            renderVideos();
        }

        // ============================================================
        // RENDER VIDEOS
        // ============================================================
        function renderVideos() {
            const container = document.getElementById('videoListContainer');
            if (videos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-video"></i>
                        <p>No videos added yet. Add your first video above!</p>
                    </div>
                `;
                return;
            }
            let html = '<div class="video-list">';
            videos.forEach(v => {
                // Share link points directly at /video/:id — the actual
                // route that serves OG tags to crawlers — rather than the
                // /?video= redirect form, to keep things simple and direct.
                const videoUrl = window.location.origin + '/video/' + v.id;
                const thumbHtml = v.thumbnail ? `<div class="video-thumb"><img src="${v.thumbnail}" alt="${escapeHtml(v.title)}"></div>` : '';
                const siteNameDisplay = v.siteName ? `<div style="font-size:12px;color:#1877f2;margin-top:2px;">Shows as: ${escapeHtml(v.siteName)}</div>` : '';
                html += `
                    <div class="video-item">
                        <div class="video-info">
                            <div class="title">${escapeHtml(v.title)}</div>
                            <div class="desc">${escapeHtml(v.description)}</div>
                            ${siteNameDisplay}
                            ${thumbHtml}
                            <div class="video-id">🔗 Share: <a href="${videoUrl}" target="_blank">${videoUrl}</a></div>
                        </div>
                        <div class="video-actions">
                            <button class="edit-btn" onclick="openEditModal(${v.id})">✏️ Edit</button>
                            <button class="delete-btn" onclick="deleteVideo(${v.id})">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // VIDEO CRUD FUNCTIONS (now talk to the real backend API)
        // ============================================================
        async function addVideo() {
            const titleInput = document.getElementById('videoTitleInput');
            const fileInput = document.getElementById('videoImageInput');
            const descInput = document.getElementById('videoDescInput');
            const siteNameInput = document.getElementById('videoSiteNameInput');
            const addBtn = document.getElementById('addVideoBtn');

            const title = titleInput.value.trim();
            const desc = descInput.value.trim();
            const siteName = siteNameInput.value.trim() || 'Viral Videos';

            if (!title || !desc) {
                showToast('Please fill in title and description!', 'error');
                return;
            }

            addBtn.disabled = true;
            addBtn.textContent = 'Adding…';

            // Default OG-sized placeholder if no image is uploaded (1200x630
            // matches Facebook/WhatsApp's recommended og:image aspect ratio).
            let imageUrl = 'https://picsum.photos/1200/630';

            try {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const formData = new FormData();
                    formData.append('image', file);

                    const uploadRes = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (uploadRes.ok) {
                        const uploadData = await uploadRes.json();
                        imageUrl = uploadData.imageUrl;
                        console.log('✅ Image uploaded to Cloudinary:', imageUrl);
                    } else {
                        showToast('Image upload failed, using placeholder', 'error');
                    }
                }

                // This is the critical fix: actually persist the video to
                // the server so /video/:id can find it and serve OG tags
                // to crawlers. Previously this only wrote to localStorage.
                const createRes = await fetch('/api/videos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        description: desc,
                        thumbnail: imageUrl,
                        siteName
                    })
                });

                if (!createRes.ok) {
                    const errData = await createRes.json().catch(() => ({}));
                    throw new Error(errData.error || 'Failed to save video');
                }

                titleInput.value = '';
                fileInput.value = '';
                descInput.value = '';
                siteNameInput.value = '';

                await loadVideos();
                showToast('Video added successfully!', 'success');

            } catch (e) {
                console.error('❌ Add video error:', e);
                showToast(e.message || 'Failed to add video', 'error');
            } finally {
                addBtn.disabled = false;
                addBtn.textContent = 'Add Video';
            }
        }

        async function deleteVideo(id) {
            if (!confirm('Are you sure you want to delete this video?')) return;
            try {
                const res = await fetch(`/api/videos/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Delete failed');
                await loadVideos();
                showToast('Video deleted!', 'success');
            } catch (e) {
                console.error('❌ Delete error:', e);
                showToast('Failed to delete video', 'error');
            }
        }

        function openEditModal(id) {
            const video = videos.find(v => v.id === id);
            if (!video) return;
            editId = id;
            document.getElementById('editTitle').value = video.title;
            document.getElementById('editImage').value = video.thumbnail || '';
            document.getElementById('editDesc').value = video.description;
            document.getElementById('editSiteName').value = video.siteName || '';
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editId = null;
        }

        async function saveEdit() {
            const title = document.getElementById('editTitle').value.trim();
            const image = document.getElementById('editImage').value.trim();
            const desc = document.getElementById('editDesc').value.trim();
            const siteName = document.getElementById('editSiteName').value.trim();

            if (!title || !image || !desc) {
                showToast('Please fill in all fields!', 'error');
                return;
            }

            try {
                const res = await fetch(`/api/videos/${editId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        thumbnail: image,
                        description: desc,
                        siteName
                    })
                });

                if (!res.ok) throw new Error('Update failed');

                await loadVideos();
                closeEditModal();
                showToast('Video updated!', 'success');

            } catch (e) {
                console.error('❌ Save edit error:', e);
                showToast('Failed to update video', 'error');
            }
        }

        // ============================================================
        // TOAST
        // ============================================================
        let toastTimer = null;
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + (type || '');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', loadVideos);
    </script>
</body>
</html>
